# Local SSH server for smoke tests (issue #16).
#
#   bash tests/fixtures/generate-keys.sh
#   cd tests/fixtures && docker compose up -d --build
#   npm run smoke:ssh
#
services:
  sshd:
    build: .
    ports:
      - '2222:2222'
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
      PASSWORD_ACCESS: 'false'
      USER_NAME: test
      SUDO_ACCESS: 'false'
      PUBLIC_KEY_FILE: /fixture-keys/smoke.pub
    volumes:
      - sshd_config:/config
      - ./keys:/fixture-keys:ro
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 2222 || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sshd_config:
