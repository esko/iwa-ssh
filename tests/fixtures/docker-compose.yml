# Local SSH server for smoke tests (issue #16).
#
#   cd tests/fixtures && docker compose up -d
#   SSH_HOST=127.0.0.1 SSH_PORT=2222 SSH_USER=test SSH_PASS=test npm run smoke:e2e
#
services:
  sshd:
    build: .
    ports:
      - '2222:2222'
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
      PASSWORD_ACCESS: 'true'
      USER_NAME: test
      USER_PASSWORD: test
      SUDO_ACCESS: 'false'
    volumes:
      - sshd_config:/config
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 2222 || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sshd_config:
